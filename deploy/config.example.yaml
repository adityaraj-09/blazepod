# deploy/config.example.yaml — complete example configuration for all sandock services.
# Copy to /etc/sandock/config.yaml and edit for your environment.
# All duration values are in milliseconds unless stated otherwise.

api:
  listen_addr: ":8080"
  jwt_secret: "change-me-in-production"    # HMAC-SHA256 signing key for API tokens
  cors_origins: []                          # list of allowed CORS origins; empty = allow all

orchestrator:
  grpc_addr: ":9090"                        # orchestrator HTTP API used by cmd/api
  state_backend: "memory"                   # "memory" (Phase 1) | "etcd" (Phase 2)

# host_agent configures the single local host agent (Phase 1 single-host mode).
# In multi-host mode use the host_agents list below instead.
host_agent:
  # grpc_addr is also the internal HTTP API address (Phase 2).
  grpc_addr: ":9091"
  # grpc_stub_addr is used for the raw gRPC stub server (once protoc stubs are generated).
  grpc_stub_addr: ":9092"
  # agent_secret is the shared secret checked via X-Agent-Secret header on internal calls.
  # Must match between orchestrator config and every host-agent.
  agent_secret: "internal-secret-change-me"
  firecracker_bin: "/usr/local/bin/firecracker"
  jailer_bin: "/usr/local/bin/jailer"
  kernel_image: "/var/lib/sandock/images/vmlinux-5.10.258"
  base_rootfs: "/var/lib/sandock/images/base-rootfs.ext4"   # ext4 file or directory
  sandbox_dir: "/var/lib/sandock/sandboxes"
  snapshot_dir: "/var/lib/sandock/snapshots"
  metrics_addr: ":9100"
  # warm_pool_size is the number of idle VMs to keep pre-booted (Phase 2).
  warm_pool_size: 2

# host_agents: Phase 2 multi-host only. Leave commented out for single-host EC2 setup.
# host_agents:
#   - id: "host-1"
#     http_addr: "10.0.0.1:9091"

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

tracing:
  # endpoint is the OTLP/HTTP collector endpoint (e.g. Grafana Tempo or Jaeger).
  # Leave empty to disable tracing (uses a noop tracer).
  endpoint: "localhost:4318"

log:
  level: "info"        # "debug" | "info" | "warn" | "error"
  format: "json"       # "json" | "text"
